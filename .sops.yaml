# sops configuration
# After first nixos-rebuild, run this to get your machine's age public key:
#   nix-shell -p ssh-to-age --run 'cat /etc/ssh/ssh_host_ed25519_key.pub | ssh-to-age'
# Then replace the placeholder below with that key.

keys:
  # Machine age keys (derived from SSH host keys)
  - &adam-laptop age1aykqnhuecf50kz9sxqa88sc06rvfapwlnhyjnlf4expwcg8gag5sn7qxyd

creation_rules:
  # Encrypt all secrets files with adam-laptop's key
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *adam-laptop
